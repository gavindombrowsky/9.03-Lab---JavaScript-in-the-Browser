<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 208 - Starting Lineup</title>
    <style>
        body {
            font-family: serif;
            padding: 20px;
        }
        fieldset {
            border: 1px solid #ccc;
            margin-bottom: 10px;
            padding: 10px;
        }
        legend {
            padding: 0 5px;
        }
        #displayArea {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
            border-top: 1px solid #000;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Starting Lineup</h1>

    <form id="lineupForm">
        <p>
            <fieldset>
                <legend>Status:</legend>
                <input type="radio" id="draft" name="status" value="Draft">
                <label for="draft">Draft</label>
                
                <input type="radio" id="final" name="status" value="Final" checked>
                <label for="final">Final</label>
            </fieldset>
        </p>

        <p>
            <label for="gameDate">Date:</label>
            <select id="gameDate" name="gameDate">
                <option value="March 20">March 20</option>
                <option value="March 24">March 24</option>
                <option value="April 2">April 2</option>
                <option value="April 6">April 6</option>
                <option value="April 13">April 13</option>
            </select>
        </p>

        <p>
            <fieldset>
                <legend>Players:</legend>
                <input type="checkbox" id="p1" name="players" value="Aarav Agarwal">
                <label for="p1">Aarav Agarwal</label><br>
                
                <input type="checkbox" id="p2" name="players" value="Ava Johnson">
                <label for="p2">Ava Johnson</label><br>
                
                <input type="checkbox" id="p3" name="players" value="Julio Ortiz">
                <label for="p3">Julio Ortiz</label><br>
                
                <input type="checkbox" id="p4" name="players" value="Liam Rubio">
                <label for="p4">Liam Rubio</label><br>
                
                <input type="checkbox" id="p5" name="players" value="Emma Witherspoon">
                <label for="p5">Emma Witherspoon</label>
            </fieldset>
        </p>

        <p>
            <input type="submit" value="Submit">
        </p>
    </form>

    <div id="displayArea"></div>

    <script>
        // Define the myLineUp function
        function myLineUp(event) {
            // Prevent the default form submission (page reload)
            event.preventDefault();

            // Use FormData to easily grab all input values
            const formData = new FormData(event.target);
            
            // Get Status and Date
            const status = formData.get('status');
            const gameDate = formData.get('gameDate');
            
            // Get all checked players into an array
            const selectedPlayers = formData.getAll('players');
            const playersString = selectedPlayers.length > 0 ? selectedPlayers.join(", ") : "None";

            // 1. Print all data to the console
            console.log("Form Data Received:");
            console.log("Status:", status);
            console.log("Date:", gameDate);
            console.log("Players:", selectedPlayers);

            // 2. Concatenate information into one string
            const resultText = `The lineup is ${status} for the game on ${gameDate}. Selected players: ${playersString}.`;

            // 3. Display the selections on the web page
            document.getElementById('displayArea').innerText = resultText;
        }

        // Attach the event listener to the form
        document.getElementById('lineupForm').addEventListener('submit', myLineUp);
    </script>

</body>
</html>
